<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DijaStreamTV</title>
    <meta name="description" content="Lecteur IPTV gratuit - regardez des centaines de chaînes en direct">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-dot"></div>
        DijaStreamTV
    </div>
    <div style="display: flex; align-items: center; gap: 1rem; flex: 1; justify-content: flex-end;">
        <div id="now-playing">Sélectionnez une chaîne</div>
        <a href="#" onclick="alert('L\'application Android/TV est en cours de développement ! Revenez bientôt.')" class="download-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            App Android / TV
        </a>
    </div>
</header>

<div class="layout">
    <div class="player-wrap">
        <div id="player-box">
            <div id="player-placeholder">
                <div class="ph-icon">📺</div>
                <p>Choisissez une chaîne pour démarrer</p>
            </div>
            <div id="loader">
                <div class="spinner"></div>
                <p>Chargement...</p>
            </div>
            <div id="error-msg">
                <div class="err-icon">⚠️</div>
                <p id="error-text">Impossible de charger cette chaîne.</p>
                <button class="retry-btn" onclick="retryChannel()">↻ Réessayer</button>
            </div>
            <iframe id="video-iframe" allowfullscreen></iframe>
            <video id="hls-video" controls playsinline></video>
        </div>
    </div>

    <div class="sidebar">
        <div class="search-wrap">
            <div class="search-inner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="search" placeholder="Rechercher..." autocomplete="off">
            </div>
        </div>
        <div class="cats" id="cats"></div>
        <div id="ch-count"></div>
        <div id="ch-list"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script src="channels.js"></script>
    <script src="app.js"></script>
</body>
</html>
